version: 1
disable_existing_loggers: false

formatters:
  default:
    format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"

handlers:
  file:
    class: logging.FileHandler
    formatter: default
    filename: /app/logs/app.log
    mode: a

  console:
    class: logging.StreamHandler
    formatter: default

root:
  level: INFO
  handlers: [file, console]

loggers:
  uvicorn.error:
    level: INFO
    handlers: [file, console]
    propagate: no

  uvicorn.access:
    level: INFO
    handlers: [file, console]
    propagate: no
